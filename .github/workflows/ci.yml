name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Diagnose Version 2 repository-object audit
        id: audit
        shell: pwsh
        run: |
          python scripts/verify_v2_final_audit.py *> v2-final-audit-ci.log
          $auditExitCode = $LASTEXITCODE
          Get-Content v2-final-audit-ci.log
          "exit_code=$auditExitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          exit 0
      - name: Upload Version 2 audit diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2-final-audit-${{ matrix.python-version }}
          path: v2-final-audit-ci.log
          if-no-files-found: error
          retention-days: 3
      - name: Enforce Version 2 repository-object audit
        shell: pwsh
        run: |
          if ("${{ steps.audit.outputs.exit_code }}" -ne "0") {
            throw "Version 2 repository-object audit failed."
          }
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Verify Version 2 D3 locked-evaluation assets
        run: python scripts/verify_v2_d3_assets.py
      - name: Verify Version 2 D4 confirmatory assets
        run: python scripts/verify_v2_d4_assets.py
      - name: Verify Version 2 D5 publication assets
        run: python scripts/verify_v2_d5_assets.py
      - name: Test portable functional and evidence suite
        env:
          MPLBACKEND: Agg
          PYTHONNOUSERSITE: "1"
          OMP_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
        run: >
          python -m pytest -q
          --ignore=tests/test_v2_d0_lock.py
          --ignore=tests/test_v2_d1_lock.py
          --ignore=tests/test_v2_d2a_lock.py
          --ignore=tests/test_v2_d2b_lock.py
          --ignore=tests/test_v2_d2c_lock.py
          --ignore=tests/test_v2_d3_lock.py
          --ignore=tests/test_v2_d4_lock.py
          --ignore=tests/test_v2_d5_lock.py
          -k "not test_v2_protocol_lock_hashes"
