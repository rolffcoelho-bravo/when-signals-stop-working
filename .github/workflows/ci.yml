name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Verify frozen Version 2 protocol
        run: python scripts/verify_v2_protocol_lock.py
      - name: Verify Version 2 D0 implementation lock
        run: python scripts/verify_v2_d0_lock.py
      - name: Verify Version 2 D1 engine lock
        run: python scripts/verify_v2_d1_lock.py
      - name: Verify Version 2 D2A selection lock
        run: python scripts/verify_v2_d2a_lock.py
      - name: Verify Version 2 D2B selection lock
        run: python scripts/verify_v2_d2b_lock.py
      - name: Verify Version 2 D2C admission lock
        run: python scripts/verify_v2_d2c_lock.py
      - name: Verify Version 2 D3 evaluation lock
        run: python scripts/verify_v2_d3_lock.py
      - name: Verify Version 2 D4 inference lock
        run: python scripts/verify_v2_d4_lock.py
      - name: Verify Version 2 D5 robustness lock
        run: python scripts/verify_v2_d5_lock.py
      - name: Verify Version 2 D5 publication assets
        run: python scripts/verify_v2_d5_assets.py
      - name: Verify Version 2 final release audit
        run: python scripts/verify_v2_final_audit.py
      - name: Test
        env:
          MPLBACKEND: Agg
        run: python -m pytest -q
