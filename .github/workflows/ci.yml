name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Verify Version 2 repository-object locks and release audit
        run: python scripts/verify_v2_final_audit.py
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Verify Version 1 replication integrity
        run: python scripts/verify_replication.py
      - name: Verify public release audit
        run: python scripts/audit_public_release.py
      - name: Verify Version 2 D3 locked-evaluation assets
        run: python scripts/verify_v2_d3_assets.py
      - name: Verify Version 2 D4 confirmatory assets
        run: python scripts/verify_v2_d4_assets.py
      - name: Verify Version 2 D5 publication assets
        run: python scripts/verify_v2_d5_assets.py
      - name: Test portable functional and evidence suite
        env:
          MPLBACKEND: Agg
          PYTHONNOUSERSITE: "1"
          OMP_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          NUMEXPR_NUM_THREADS: "1"
        run: >
          python -m pytest -q
          --ignore=tests/test_v2_d0_lock.py
          --ignore=tests/test_v2_d1_lock.py
          --ignore=tests/test_v2_d2a_lock.py
          --ignore=tests/test_v2_d2b_lock.py
          --ignore=tests/test_v2_d2c_lock.py
          --ignore=tests/test_v2_d3_lock.py
          --ignore=tests/test_v2_d4_lock.py
          --ignore=tests/test_v2_d5_lock.py
          --ignore=tests/test_v2_d3_assets.py
          --ignore=tests/test_v2_d4_assets.py
          --ignore=tests/test_v2_d5_assets.py
          -k "not test_v2_protocol_lock_hashes"
