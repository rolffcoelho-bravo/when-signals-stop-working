name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Capture release audit diagnostic
        id: diagnostic
        shell: pwsh
        run: |
          @'
          import hashlib
          import subprocess

          paths = (
              ".github/workflows/ci.yml",
              "scripts/verify_v2_final_audit.py",
          )
          with open("v2-ci-diagnostic.txt", "w", encoding="utf-8") as handle:
              for path in paths:
                  payload = subprocess.check_output(["git", "show", f"HEAD:{path}"])
                  handle.write(
                      f"{path}|{len(payload)}|{hashlib.sha256(payload).hexdigest()}\n"
                  )
              completed = subprocess.run(
                  ["python", "scripts/verify_v2_final_audit.py"],
                  text=True,
                  capture_output=True,
              )
              handle.write(f"exit_code|{completed.returncode}\n")
              handle.write(completed.stdout)
              handle.write(completed.stderr)
          '@ | python
          Get-Content v2-ci-diagnostic.txt
          exit 0
      - name: Upload release audit diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2-ci-diagnostic-${{ matrix.python-version }}
          path: v2-ci-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
      - name: Stop diagnostic run
        run: exit 1
