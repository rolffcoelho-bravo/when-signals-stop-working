name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Capture exact release-control objects
        id: audit
        shell: pwsh
        run: |
          @'
          import hashlib
          import subprocess

          with open("v2-final-audit-exact.log", "w", encoding="utf-8") as handle:
              for path in (
                  ".github/workflows/ci.yml",
                  "scripts/verify_v2_final_audit.py",
              ):
                  payload = subprocess.check_output(["git", "show", f"HEAD:{path}"])
                  handle.write(
                      f"{path}|{len(payload)}|{hashlib.sha256(payload).hexdigest()}\n"
                  )
              completed = subprocess.run(
                  ["python", "scripts/verify_v2_final_audit.py"],
                  text=True,
                  capture_output=True,
              )
              handle.write(f"exit_code|{completed.returncode}\n")
              handle.write(completed.stdout)
              handle.write(completed.stderr)
          '@ | python
          $code = 1
          Get-Content v2-final-audit-exact.log
          "exit_code=$code" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          exit 0
      - name: Upload exact release-control objects
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2-final-audit-exact-objects
          path: v2-final-audit-exact.log
          if-no-files-found: error
          retention-days: 1
      - name: Stop object diagnostic
        run: exit 1
